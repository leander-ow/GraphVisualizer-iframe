<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token graph</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="leftPane">
        <canvas id="graphCanvas"></canvas>
        <div id="infoPanel"></div>
      </div>

      <aside id="sidebar">
        <input id="search" type="text" placeholder="Token suchen..." />
        <div id="selectedLabel">Kein Knoten ausgewählt</div>

        <section>
          <div class="sectionHead">
            <h3>Als Ziel-Token: Kontext (a, b) → dieser Knoten</h3>
            <label><input id="toggle-c" type="checkbox" /> Kanten</label>
          </div>
          <ul id="list-c" class="list"></ul>
        </section>

        <section>
          <div class="sectionHead">
            <h3>Als erstes Kontext-Token: dieser Knoten, b → c</h3>
            <label><input id="toggle-a" type="checkbox" /> Kanten</label>
          </div>
          <ul id="list-a" class="list"></ul>
        </section>

        <section>
          <div class="sectionHead">
            <h3>Als zweites Kontext-Token: a, dieser Knoten → c</h3>
            <label><input id="toggle-b" type="checkbox" /> Kanten</label>
          </div>
          <ul id="list-b" class="list"></ul>
        </section>

        <h3 id="filteredHeading">Filter deaktiviert</h3>
        <ul id="list-filtered" class="list"></ul>

        <button id="relayoutBtn">Layout neu berechnen</button>
      </aside>
    </div>

    <dialog id="relayoutDialog">
      <form method="dialog" id="relayoutForm">
        <label>
          Algorithmus
          <select id="algorithmSelect">
            <option>drl</option><option>fr</option><option>kk</option><option>graphopt</option>
            <option>lgl</option><option>mds</option><option>circle</option><option>grid</option><option>random</option>
          </select>
        </label>
        <label>
          Filter-Limit
          <input id="filterLimitInput" type="number" value="-1" />
        </label>
        <menu>
          <button value="cancel">Abbrechen</button>
          <button value="default" id="dialogOk">OK</button>
        </menu>
      </form>
    </dialog>

    <div id="busyOverlay" hidden>Layout wird neu berechnet...</div>

    <script src="/app.js"></script>
  </body>
</html>
